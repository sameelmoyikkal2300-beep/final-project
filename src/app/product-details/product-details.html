<div
  class="details-container"
  *ngIf="product"
>

  <div class="image-section">

    <img
      [src]="product.image"
      class="product-image"
    >

  </div>

  <div class="content-section">

    <h1>
      {{ product.name }}
    </h1>

    <p class="description">
      {{ product.description }}
    </p>

    <h2 class="price">
      ₹ {{ product.price }}
    </h2>

    <button
  (click)="addToCart()"
>
  Add To Cart
</button>

  </div>

</div>
