
<section class="container py-5">

  <h1 class="text-center fw-bold mb-5">
    Contact Us

  <div class="row g-5">

    <div class="col-md-6">

      <div class="card shadow border-0 p-4">

          <div class="mb-3">

            <label class="form-label fw-bold">
              Full Name
            </label>

            <input
              type="text"
              class="form-control"
              placeholder="Enter your name"
            >

          </div>

          <div class="mb-3">

            <label class="form-label fw-bold">
              Email Address
            </label>

            <input
              type="email"
              class="form-control"
              placeholder="Enter your email"
            >

          </div>

          <div class="mb-3">

            <label class="form-label fw-bold">
              Phone Number
            </label>

            <input
              type="tel"
              class="form-control"
              placeholder="Enter your phone number"
            >

          </div>

          <div class="mb-3">

            <label class="form-label fw-bold">
              Message
            </label>

            <textarea
              class="form-control"
              rows="5"
              placeholder="Type your message"
            ></textarea>

          </div>

          <button class="btn btn-dark btn-lg w-100">
            Send Message
          </button>

        </form>

      </div>

    </div>

    <div class="col-md-6">

      <div class="card shadow border-0 p-4 h-100">
